name: Build Android APK

on:
 push:
 branches: [main]
 pull_request:
 branches: [main]

jobs:
 build:
 runs-on: ubuntu-latest

 steps:
 - name: Checkout
 uses: actions/checkout@v4

 - name: Setup Node.js
 uses: actions/setup-node@v4
 with:
 node-version: '20'
 cache: 'npm'
 cache-dependency-path: question-bank-app/package-lock.json

 - name: Setup Java
 uses: actions/setup-java@v4
 with:
 distribution: 'temurin'
 java-version: '17'

 - name: Setup Android SDK
 uses: android-actions/setup-android@v2

 - name: Install dependencies
 working-directory: question-bank-app
 run: npm ci

 - name: Add Android platform
 working-directory: question-bank-app
 run: npx cap add android

 - name: Sync web assets to Android
 working-directory: question-bank-app
 run: npx cap sync android

 - name: Build web app
 working-directory: question-bank-app
 run: npm run build

 - name: Sync to Android (after build)
 working-directory: question-bank-app
 run: npx cap copy android

 - name: Build debug APK
 working-directory: question-bank-app/android
 run: ./gradlew assembleDebug

 - name: Upload APK
 uses: actions/upload-artifact@v4
 with:
 name: question-bank-apk
 path: question-bank-app/android/app/build/outputs/apk/debug/app-debug.apk
 retention-days: 7
