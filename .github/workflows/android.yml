name: Build Android APK

on:
 push:
 branches: [main]
 pull_request:
 branches: [main]

jobs:
 build:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - name: Setup Node.js
 uses: actions/setup-node@v4
 with:
 node-version: '20'

 - name: Install dependencies
 run: |
 cd question-bank-app
 npm install

 - name: Build web app
 run: |
 cd question-bank-app
 npm run build

 - name: Setup Capacitor
 run: |
 cd question-bank-app
 npm install @capacitor/cli @capacitor/core @capacitor/android
 npx cap add android
 npx cap sync android

 - name: Build APK
 run: |
 cd question-bank-app/android
 chmod +x gradlew
 ./gradlew assembleDebug

 - name: Upload APK
 uses: actions/upload-artifact@v4
 with:
 name: apk
 path: question-bank-app/android/app/build/outputs/apk/debug/app-debug.apk
